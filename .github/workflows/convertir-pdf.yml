name: Convertir Word a PDF

on:
  push:

jobs:
  convertir:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice

      - name: Convertir DOCX a PDF
        run: |
          libreoffice --headless --convert-to pdf probando.docx

      - name: Guardar PDF
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Generado
          path: documento.pdf
